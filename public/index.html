<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subbrain Chat</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --user-bg: #1f2937;
        --bot-bg: #0d1117;
        --sidebar-w: 260px;
        --font: "Segoe UI", system-ui, -apple-system, sans-serif;
        --mono: "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        display: flex;
      }

      /* ─── Sidebar ─── */
      #sidebar {
        width: var(--sidebar-w);
        min-width: var(--sidebar-w);
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #sidebar .top {
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }
      #sidebar .top button {
        width: 100%;
        padding: 8px 12px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        font-weight: 500;
      }
      #sidebar .top button:hover {
        filter: brightness(1.15);
      }
      #chat-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .chat-item {
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
        position: relative;
      }
      .chat-item:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
      }
      .chat-item.active {
        background: rgba(88, 166, 255, 0.12);
        color: var(--text);
      }
      .chat-item .source-badge {
        font-size: 9px;
        padding: 1px 4px;
        border-radius: 3px;
        background: var(--border);
        color: var(--muted);
        flex-shrink: 0;
      }
      .chat-item .delete-btn {
        display: none;
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 14px;
        padding: 2px 4px;
      }
      .chat-item:hover .delete-btn {
        display: block;
      }
      .chat-item .delete-btn:hover {
        color: #f85149;
      }
      #sidebar .bottom {
        padding: 8px 12px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #sidebar .bottom .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #3fb950;
      }

      /* ─── Main area ─── */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        flex-shrink: 0;
      }
      header h1 {
        font-size: 15px;
        font-weight: 600;
      }
      header select {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 13px;
        cursor: pointer;
      }
      header .spacer {
        flex: 1;
      }
      header label {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }

      /* ─── Messages ─── */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.55;
        word-break: break-word;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--user-bg);
        border-bottom-right-radius: 4px;
        white-space: pre-wrap;
      }
      .msg.assistant {
        align-self: flex-start;
        background: var(--surface);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .msg .meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
      }
      .msg code {
        font-family: var(--mono);
        background: rgba(110, 118, 129, 0.15);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 13px;
      }
      .msg pre {
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        margin: 8px 0;
        overflow-x: auto;
        font-size: 13px;
      }
      .msg pre code {
        background: none;
        padding: 0;
      }
      .typing {
        opacity: 0.6;
        font-style: italic;
      }
      .msg .thinking {
        border-left: 3px solid var(--muted);
        padding: 6px 10px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        max-height: 200px;
        overflow-y: auto;
        transition: max-height 0.3s ease;
      }
      .msg .thinking.collapsed {
        max-height: 28px;
        overflow: hidden;
        cursor: pointer;
      }
      .msg .thinking-toggle {
        font-size: 11px;
        color: var(--muted);
        cursor: pointer;
        margin-bottom: 4px;
        user-select: none;
      }
      .msg .thinking-toggle:hover {
        color: var(--accent);
      }
      #empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 14px;
      }

      /* ─── Input ─── */
      #input-area {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        gap: 10px;
        flex-shrink: 0;
      }
      #input-area textarea {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        font-family: var(--font);
        resize: none;
        outline: none;
        min-height: 44px;
        max-height: 200px;
        line-height: 1.4;
      }
      #input-area textarea:focus {
        border-color: var(--accent);
      }
      #input-area button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0 18px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
      }
      #input-area button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #input-area button:hover:not(:disabled) {
        filter: brightness(1.15);
      }
    </style>
  </head>
  <body>
    <!-- ─── Sidebar ─── -->
    <div id="sidebar">
      <div class="top">
        <button id="new-chat-btn">+ Новый чат</button>
      </div>
      <div id="chat-list"></div>
      <div class="bottom">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Подключён</span>
        <span id="rpm-info"></span>
      </div>
    </div>

    <!-- ─── Main ─── -->
    <div id="main">
      <header>
        <h1>🧠 Subbrain</h1>
        <select id="model">
          <option value="flash">Флэш (Step 3.5 Flash)</option>
          <option value="coder">Кодер (Qwen3 Coder 480B)</option>
          <option value="teamlead" selected>Лид (Kimi K2 Thinking)</option>
          <option value="critic">Критик (Devstral 123B)</option>
          <option value="generalist">Генералист (Mistral Large 3 675B)</option>
        </select>
        <div class="spacer"></div>
        <label><input type="checkbox" id="direct-mode" /> Direct</label>
      </header>

      <div id="messages">
        <div id="empty-state">Выбери чат или создай новый</div>
      </div>

      <div id="input-area">
        <textarea
          id="input"
          rows="1"
          placeholder="Напиши сообщение..."
          autofocus
        ></textarea>
        <button id="send" disabled>Отправить</button>
      </div>
    </div>

    <script>
      const API = location.origin;
      let TOKEN = null;
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const modelEl = document.getElementById("model");
      const directEl = document.getElementById("direct-mode");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const rpmInfo = document.getElementById("rpm-info");
      const chatListEl = document.getElementById("chat-list");
      const newChatBtn = document.getElementById("new-chat-btn");
      const emptyState = document.getElementById("empty-state");

      let currentChatId = null;
      let history = [];
      let streaming = false;

      // ─── API helpers ───
      async function fetchToken() {
        const res = await fetch(`${API}/api/token`);
        const data = await res.json();
        TOKEN = data.token;
      }

      const apiFetch = (path, opts = {}) =>
        fetch(`${API}${path}`, {
          ...opts,
          headers: {
            Authorization: `Bearer ${TOKEN}`,
            "Content-Type": "application/json",
            ...(opts.headers || {}),
          },
        });

      // ─── Chat list ───
      async function loadChats() {
        try {
          const res = await apiFetch("/v1/chats/");
          const chats = await res.json();
          renderChatList(chats);
        } catch {}
      }

      function renderChatList(chats) {
        chatListEl.innerHTML = "";
        for (const chat of chats) {
          const el = document.createElement("div");
          el.className = `chat-item${chat.id === currentChatId ? " active" : ""}`;

          const sourceColors = {
            web: "#58a6ff",
            api: "#3fb950",
            continue: "#d2a8ff",
            autonomous: "#f0883e",
          };
          const badge = `<span class="source-badge" style="color:${sourceColors[chat.source] || "var(--muted)"}">${chat.source}</span>`;

          const title = escapeHtml(chat.title || "Без названия");
          el.innerHTML = `${badge} <span style="overflow:hidden;text-overflow:ellipsis">${title}</span>
            <button class="delete-btn" title="Удалить">×</button>`;

          el.addEventListener("click", (e) => {
            if (e.target.classList.contains("delete-btn")) {
              e.stopPropagation();
              deleteChat(chat.id);
              return;
            }
            openChat(chat.id);
          });
          chatListEl.appendChild(el);
        }
      }

      async function openChat(chatId) {
        if (streaming) return;
        currentChatId = chatId;
        history = [];
        messagesEl.innerHTML = "";
        if (emptyState) emptyState.remove();

        // Mark active in sidebar
        document
          .querySelectorAll(".chat-item")
          .forEach((el) => el.classList.remove("active"));
        const items = chatListEl.querySelectorAll(".chat-item");
        items.forEach((el) => {
          if (
            el.dataset?.chatId === chatId ||
            el.textContent.includes(chatId)
          ) {
            el.classList.add("active");
          }
        });

        // Load messages
        try {
          const res = await apiFetch(`/v1/chats/${chatId}/messages`);
          const msgs = await res.json();
          for (const msg of msgs) {
            if (msg.role === "user" || msg.role === "assistant") {
              const el = addMessage(msg.role, "");
              if (msg.role === "assistant") {
                if (msg.reasoning) {
                  addThinkingBlock(el, msg.reasoning, true);
                }
                const contentEl = document.createElement("div");
                contentEl.className = "content";
                el.appendChild(contentEl);
                formatContent(contentEl, msg.content);
              } else {
                el.textContent = msg.content;
              }
              history.push({ role: msg.role, content: msg.content });
            }
          }
          // Set model from chat
          const chatRes = await apiFetch(`/v1/chats/${chatId}`);
          const chat = await chatRes.json();
          if (
            chat.model &&
            modelEl.querySelector(`option[value="${chat.model}"]`)
          ) {
            modelEl.value = chat.model;
          }
        } catch (err) {
          messagesEl.innerHTML = `<div style="color:var(--muted);text-align:center;padding:40px">Ошибка загрузки: ${err.message}</div>`;
        }

        loadChats(); // refresh active state
      }

      async function createNewChat() {
        if (streaming) return;
        const id = crypto.randomUUID();
        currentChatId = id;
        history = [];
        messagesEl.innerHTML = "";
        if (emptyState) emptyState.remove();
        // Chat will be auto-created on first message
        loadChats();
      }

      async function deleteChat(chatId) {
        if (!confirm("Удалить чат?")) return;
        await apiFetch(`/v1/chats/${chatId}`, { method: "DELETE" });
        if (currentChatId === chatId) {
          currentChatId = null;
          history = [];
          messagesEl.innerHTML = `<div id="empty-state" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px">Выбери чат или создай новый</div>`;
        }
        loadChats();
      }

      newChatBtn.addEventListener("click", createNewChat);

      // ─── Messaging ───
      function addMessage(role, content) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        if (content) div.textContent = content;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      function addThinkingBlock(parentEl, text, collapsed = false) {
        const toggle = document.createElement("div");
        toggle.className = "thinking-toggle";
        toggle.textContent = collapsed
          ? "💭 Размышления (развернуть)"
          : "💭 Размышления...";
        parentEl.appendChild(toggle);
        const thinkEl = document.createElement("div");
        thinkEl.className = "thinking" + (collapsed ? " collapsed" : "");
        thinkEl.textContent = text;
        parentEl.appendChild(thinkEl);
        toggle.onclick = () => {
          thinkEl.classList.toggle("collapsed");
          toggle.textContent = thinkEl.classList.contains("collapsed")
            ? "💭 Размышления (развернуть)"
            : "💭 Размышления...";
        };
        return thinkEl;
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function formatContent(el, text) {
        let html = escapeHtml(text)
          .replace(/```(\w*)\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>")
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\n/g, "<br>");
        el.innerHTML = html;
      }

      // Auto-resize textarea
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
      });

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      sendBtn.addEventListener("click", () => sendMessage());

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || streaming) return;

        // Auto-create chat if none selected
        if (!currentChatId) {
          currentChatId = crypto.randomUUID();
          if (emptyState) emptyState.remove();
        }

        addMessage("user", text);
        history.push({ role: "user", content: text });
        inputEl.value = "";
        inputEl.style.height = "auto";

        streaming = true;
        sendBtn.disabled = true;
        sendBtn.textContent = "...";

        const botEl = addMessage("assistant", "");
        botEl.classList.add("typing");

        const hdrs = {
          Authorization: `Bearer ${TOKEN}`,
          "Content-Type": "application/json",
          "X-Session-Id": currentChatId,
          "X-Chat-Id": currentChatId,
          "X-Chat-Source": "web",
          Accept: "text/event-stream",
        };
        if (directEl.checked) hdrs["X-Direct-Mode"] = "true";

        try {
          const res = await fetch(`${API}/v1/chat/completions`, {
            method: "POST",
            headers: hdrs,
            body: JSON.stringify({
              model: modelEl.value,
              messages: history,
              stream: true,
              max_tokens: 4096,
              temperature: 0.7,
            }),
          });

          if (!res.ok) {
            const err = await res.text();
            botEl.textContent = `⚠️ Ошибка ${res.status}: ${err}`;
            botEl.classList.remove("typing");
            finishStreaming();
            return;
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let fullContent = "";
          let fullReasoning = "";
          let buffer = "";
          let thinkingEl = null;
          let contentEl = null;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const payload = line.slice(6).trim();
              if (payload === "[DONE]") continue;

              try {
                const chunk = JSON.parse(payload);
                const delta = chunk.choices?.[0]?.delta;
                if (!delta) continue;

                if (delta.reasoning_content) {
                  fullReasoning += delta.reasoning_content;
                  if (!thinkingEl) {
                    thinkingEl = addThinkingBlock(botEl, "");
                  }
                  thinkingEl.textContent = fullReasoning;
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }

                if (delta.content) {
                  if (thinkingEl && !contentEl) {
                    thinkingEl.classList.add("collapsed");
                    const toggle = botEl.querySelector(".thinking-toggle");
                    if (toggle)
                      toggle.textContent = "💭 Размышления (развернуть)";
                  }
                  fullContent += delta.content;
                  if (!contentEl) {
                    contentEl = document.createElement("div");
                    contentEl.className = "content";
                    botEl.appendChild(contentEl);
                  }
                  formatContent(contentEl, fullContent);
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }
              } catch {}
            }
          }

          if (!fullContent && fullReasoning) {
            fullContent = fullReasoning;
            if (!contentEl) {
              contentEl = document.createElement("div");
              contentEl.className = "content";
              botEl.appendChild(contentEl);
            }
            formatContent(contentEl, fullContent);
          }

          botEl.classList.remove("typing");
          history.push({ role: "assistant", content: fullContent });
          checkHealth();
          loadChats(); // refresh sidebar (title may have been auto-set)
        } catch (err) {
          botEl.textContent = `⚠️ Сетевая ошибка: ${err.message}`;
          botEl.classList.remove("typing");
        }

        finishStreaming();
      }

      function finishStreaming() {
        streaming = false;
        sendBtn.disabled = false;
        sendBtn.textContent = "Отправить";
      }

      // ─── Health check ───
      async function checkHealth() {
        try {
          const r = await fetch(`${API}/health`);
          const d = await r.json();
          statusDot.style.background = "#3fb950";
          statusText.textContent = "Подключён";
          rpmInfo.textContent = `${d.rpm.currentLoad}/${d.rpm.currentLoad + d.rpm.availableSlots} RPM`;
        } catch {
          statusDot.style.background = "#f85149";
          statusText.textContent = "Отключён";
          rpmInfo.textContent = "";
        }
      }
      setInterval(checkHealth, 15000);

      // ─── Keyboard shortcuts ───
      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "l") {
          e.preventDefault();
          createNewChat();
        }
      });

      // ─── Init ───
      (async () => {
        try {
          await fetchToken();
          sendBtn.disabled = false;
        } catch {
          statusDot.style.background = "#f85149";
          statusText.textContent = "Ошибка авторизации";
          return;
        }
        loadChats();
        checkHealth();
      })();
    </script>
  </body>
</html>
