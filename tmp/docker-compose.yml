services:
  subbrain:
    build: .
    container_name: subbrain
    restart: unless-stopped
    shm_size: "1gb"
    init: true
    ports:
      - "127.0.0.1:4000:3000"
    volumes:
      - subbrain-data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/subbrain.db
      - LOG_DIR=/data/logs
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build: ./web
    container_name: subbrain-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://subbrain:4000
    depends_on:
      subbrain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  subbrain-data:
    name: subbrain-data