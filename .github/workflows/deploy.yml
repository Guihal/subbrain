name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            APP_DIR="/opt/subbrain"
            REPO="https://github.com/${{ github.repository }}.git"

            # First deploy: clone
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR/deploy" "$APP_DIR/src" 2>/dev/null || true
              git clone "$REPO" "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Pull latest
            git fetch origin main
            git reset --hard origin/main

            # Ensure .env exists
            if [ ! -f .env ]; then
              echo "ERROR: .env not found on server. Create it first:"
              echo "  scp .env root@server:/opt/subbrain/.env"
              exit 1
            fi

            # Ensure persistent DB volume exists before rebuilds
            docker volume inspect subbrain-data > /dev/null 2>&1 || docker volume create subbrain-data > /dev/null

            # Build and restart (DB volume is safe)
            docker compose build --pull
            docker compose up -d --force-recreate --remove-orphans

            # ─── Caddy config ───
            if [ -f deploy/Caddyfile ]; then
              DOMAIN="${SUBBRAIN_DOMAIN:-subbrain.dmtr.ru}"
              AUTH_USER="${CADDY_AUTH_USER:-dimonya}"
              AUTH_HASH='${{ secrets.CADDY_AUTH_HASH }}'

              sed -e "s|{domain}|${DOMAIN}|g" \
                  -e "s|{auth_user}|${AUTH_USER}|g" \
                  -e "s|{auth_hash}|${AUTH_HASH}|g" \
                  deploy/Caddyfile > /etc/caddy/Caddyfile

              # Stop conflicting services
              systemctl stop hysteria-caddy 2>/dev/null || true
              systemctl disable hysteria-caddy 2>/dev/null || true
              systemctl stop nginx 2>/dev/null || true
              systemctl disable nginx 2>/dev/null || true

              mkdir -p /var/log/caddy
              systemctl enable caddy
              systemctl reload caddy || systemctl restart caddy
              echo "✅ Caddy reloaded (domain: $DOMAIN)"
            fi

            # Wait for health
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
                echo "✅ Subbrain is healthy"
                exit 0
              fi
              sleep 2
            done

            echo "❌ Health check failed"
            docker compose logs --tail=50
            exit 1
