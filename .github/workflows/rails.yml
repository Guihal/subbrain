name: rails

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: rails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: file-size + deep-imports + forbidden-patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: file-size cap
        run: STRICT_FILE_RULES=1 bun run scripts/check-file-size.ts
      - name: deep-import ban
        run: STRICT_FILE_RULES=1 bun run scripts/check-deep-imports.ts
      - name: forbidden patterns
        run: STRICT_FILE_RULES=1 bun run scripts/check-forbidden-patterns.ts

  biome:
    name: biome (lint + format strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: biome check
        run: bunx biome check --error-on-warnings .

  typecheck:
    name: tsc --noEmit (strict + noUncheckedIndexedAccess + exactOptionalPropertyTypes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: tsc
        run: bunx tsc --noEmit -p tsconfig.json

  tests:
    name: bun test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: tests
        run: bun test --bail
