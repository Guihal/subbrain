services:
  cliproxy:
    image: ghcr.io/router-for-me/cliproxyapi:v6
    container_name: subbrain-cliproxy
    restart: unless-stopped
    expose: ["8080"]
    volumes:
      - type: bind
        source: /root/.codex/auth.json
        target: /app/auth.json
        read_only: true
    environment:
      - CLIPROXY_AUTH_TOKEN=${OPENAI_COMPAT_API_KEY:-cliproxy-local}
      - CLIPROXY_CODEX_AUTH_PATH=/app/auth.json
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  subbrain:
    build: .
    container_name: subbrain
    restart: unless-stopped
    depends_on:
      cliproxy:
        condition: service_started
    # Default /dev/shm is 64MB; Chromium (Playwright MCP) hangs on real pages
    # without room to spill tabs/GPU buffers. 1GB is the conventional fix.
    shm_size: "1gb"
    # Chrome forks many subprocesses (crashpad, renderer, utility). Without
    # an init reaping them, they become zombies and MCP's browser_navigate
    # hangs forever because Chrome's internal coordination relies on them.
    init: true
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      # Persistent volume for SQLite DB + logs
      # This survives container rebuilds, image updates, everything.
      - subbrain-data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/subbrain.db
      - LOG_DIR=/data/logs
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:4000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build: ./web
    container_name: subbrain-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=
    depends_on:
      subbrain:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  # Named volume — lives in /var/lib/docker/volumes/subbrain-data/
  # `docker compose down` does NOT delete it
  # Only `docker compose down -v` or `docker volume rm` deletes it
  subbrain-data:
    name: subbrain-data
